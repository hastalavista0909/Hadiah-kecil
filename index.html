<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Ikaa ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #ff9ff3 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        /* Floating Hearts Background */
        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff1744;
            animation: float 6s ease-in-out infinite;
            opacity: 0.7;
        }

        .heart:nth-child(odd) { animation-delay: 1s; }
        .heart:nth-child(even) { animation-delay: 3s; font-size: 15px; color: #ff69b4; }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Big Love Image */
        .big-love {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(5px 5px 10px rgba(196, 69, 105, 0.5));
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        /* Teddy Bear Image */
        .teddy {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 300px;
            z-index: 20;
            cursor: pointer;
            animation: bounce 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .teddy:hover {
            transform: translateX(-50%) scale(1.05);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-20px); }
        }

        /* Balloons */
        .balloon {
            position: absolute;
            font-size: 24px;
            animation: balloonFloat 8s ease-in-out infinite;
        }

        .balloon:nth-child(1) { left: 10%; animation-delay: 0s; color: #ff69b4; }
        .balloon:nth-child(2) { left: 20%; animation-delay: 2s; color: #ff1744; font-size: 20px; }
        .balloon:nth-child(3) { right: 20%; animation-delay: 4s; color: #ff9ff3; }
        .balloon:nth-child(4) { right: 10%; animation-delay: 1s; color: #ff6b9d; font-size: 22px; }

        @keyframes balloonFloat {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        /* Message Paper */
        .message {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 380px;
            height: 140px;
            background: linear-gradient(145deg, #fff, #f8d7da);
            border-radius: 20px;
            box-shadow: 
                10px 10px 25px rgba(0,0,0,0.3), 
                inset 3px 3px 8px rgba(255,255,255,0.9),
                0 0 20px rgba(255, 105, 180, 0.5);
            padding: 25px;
            text-align: center;
            font-size: 1.4rem;
            color: #c44569;
            font-weight: bold;
            opacity: 0;
            transform: translateX(-50%) scale(0.7) rotateY(90deg);
            transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 30;
            cursor: pointer;
            border: 3px solid #ff69b4;
        }

        .message.open {
            opacity: 1;
            transform: translateX(-50%) scale(1) rotateY(0deg);
        }

        .message h2 {
            color: #ff1744;
            margin-bottom: 8px;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Click instruction */
        .click-hint {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            animation: blink 2s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.4; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .big-love {
                width: 250px;
                height: 250px;
            }
            .teddy {
                width: 200px;
                height: 240px;
            }
            .message {
                width: 320px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💓</div>
    <div class="heart">💞</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>

    <!-- Balloons -->
    <div class="balloon">🎈</div>
    <div class="balloon">🎈</div>
    <div class="balloon">🎈</div>
    <div class="balloon">🎈</div>

    <!-- Big Love IMAGE - GANTI LINK INI -->
    <img src="https://raw.githubusercontent.com/NAMAGITHUBMU/main/love.png" 
         alt="LOVE" class="big-love" onerror="this.src='https://via.placeholder.com/300x300/ff1744/ff69b4?text=LOVE'">

    <!-- Teddy Bear IMAGE - GANTI LINK INI -->
    <img src="https://raw.githubusercontent.com/NAMAGITHUBMU/main/teddy.png" 
         alt="Teddy Bear" class="teddy" onclick="toggleMessage()" 
         onerror="this.src='https://via.placeholder.com/250x300/8B4513/D2691E?text=🧸'">

    <!-- Message Paper -->
    <div class="message" id="message">
        <h2>💌</h2>
        <div>I love you Ikaa,</div>
        <div>I made this hoping you like it. 💕</div>
    </div>

    <!-- Click hint -->
    <div class="click-hint">Klik teddy bear nya yuk! 🧸💕</div>

    <script>
        function toggleMessage() {
            const message = document.getElementById('message');
            const teddy = document.querySelector('.teddy');
            
            message.classList.toggle('open');
            
            // Teddy bear shake effect
            teddy.style.animation = 'none';
            setTimeout(() => {
                teddy.style.animation = 'bounce 3s ease-in-out infinite';
            }, 100);
            
            // Heart burst effect
            if (message.classList.contains('open')) {
                createHeartBurst();
            }
        }

        function createHeartBurst() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = ['💖','💕','💗','💓','💞'][Math.floor(Math.random()*5)];
                    heart.className = 'heart';
                    heart.style.left = '50%';
                    heart.style.fontSize = '25px';
                    heart.style.animationDuration = '1.5s';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 1500);
                }, i * 80);
            }
        }

        // Auto floating hearts
        setInterval(() => {
            const hearts = ['💖', '💕', '💗', '💓', '💞', '💝'];
            const heart = document.createElement('div');
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 8000);
        }, 1500);

        // Preload images
        const loveImg = new Image();
        loveImg.src = 'https://raw.githubusercontent.com/NAMAGITHUBMU/main/love.png';
        const teddyImg = new Image();
        teddyImg.src = 'https://raw.githubusercontent.com/NAMAGITHUBMU/main/teddy.png';
        const loveWingsImg = new Image();
        loveImg.src = 'https://raw.githubusercontent.com/NAMAGITHUBMU/main/loveWings.png';
    </script>
</body>
</html>
